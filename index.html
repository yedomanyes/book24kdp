<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <!-- SEO -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Book24 Studio – KI-gestütztes Buch-Schreibwerkzeug für KDP und Self-Publishing." />
    <meta name="theme-color" content="#ffffff" />
    <!-- Open Graph (Google / Social) -->
    <meta property="og:title" content="Book24 Studio" />
    <meta property="og:description" content="KI-gestütztes Buch-Schreibwerkzeug für KDP und Self-Publishing." />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:type" content="website" />
    <title>Book24 Studio</title>
    <script>
      // Global Safari Private Mode & QuotaExceededError protection
      try {
        var origSetItem = Storage.prototype.setItem;
        Storage.prototype.setItem = function(key, value) {
          try {
            origSetItem.call(this, key, value);
          } catch (e) {
            console.warn('Storage.setItem failed (blocked or quota exceeded):', e);
          }
        };
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="error-fallback" style="display:none; position:fixed; inset:0; z-index:99999999; background:#900; color:#fff; padding:20px; font-family:monospace; font-size:14px; overflow:auto;">
      <h1 style="margin:0 0 10px 0; font-size:18px;">⚠️ Ein kritischer Fehler ist aufgetreten:</h1>
      <pre id="error-details" style="white-space:pre-wrap; margin:0;"></pre>
      <button onclick="window.location.reload(true)" style="margin-top:15px; padding:8px 16px; background:#fff; color:#900; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Seite neu laden</button>
    </div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var fb = document.getElementById('error-fallback');
        var det = document.getElementById('error-details');
        if (fb && det) {
          fb.style.display = 'block';
          det.textContent = msg + '\nbei ' + url + ':' + line + ':' + col + '\n\nStack:\n' + (error && error.stack ? error.stack : 'Kein Stack vorhanden');
        }
        return false;
      };
      window.onunhandledrejection = function(event) {
        var fb = document.getElementById('error-fallback');
        var det = document.getElementById('error-details');
        if (fb && det) {
          fb.style.display = 'block';
          var err = event.reason;
          det.textContent = 'Unhandled Promise Rejection:\n' + (err && err.stack ? err.stack : String(err));
        }
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
